name: Deploy Frontend and Worker to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    environment: "Cloudflare Deployment"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate required secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then echo "CLOUDFLARE_API_TOKEN is not set"; exit 1; fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then echo "CLOUDFLARE_ACCOUNT_ID is not set"; exit 1; fi
          if [ -z "$CLOUDFLARE_PAGES_PROJECT_NAME" ]; then echo "CLOUDFLARE_PAGES_PROJECT_NAME is not set"; exit 1; fi
          if [ -z "$NEXT_PUBLIC_API_URL" ]; then echo "NEXT_PUBLIC_API_URL is not set"; exit 1; fi
          if [ -z "$NEXT_PUBLIC_MOD_ACCESS" ]; then echo "NEXT_PUBLIC_MOD_ACCESS is not set"; exit 1; fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_MOD_ACCESS: ${{ secrets.NEXT_PUBLIC_MOD_ACCESS }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_MOD_ACCESS: ${{ secrets.NEXT_PUBLIC_MOD_ACCESS }}
        run: npm run build

      - name: Install worker dependencies
        working-directory: cloudflare-hono-backend
        run: npm install

      - name: Deploy Cloudflare Worker backend
        working-directory: cloudflare-hono-backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Deploy frontend to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          directory: frontend/out
